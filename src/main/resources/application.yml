spring:
  application:
    name: protein-tracker
  datasource:
    url: jdbc:h2:file:./data/protein_tracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-this-secret-key-before-production-use-32bytes-min}
    expiration-ms: 86400000 # 24h
