spring:
  application:
    name: protein-tracker
  datasource:
    url: jdbc:h2:file:./data/protein_tracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-this-secret-key-before-production-use-32bytes-min}
    expiration-ms: 86400000 # 24h
  ai:
    gemini:
      # Leave unset to run on the heuristic fallback estimator instead of a real vision call.
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-3.5-flash}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${ANTHROPIC_MODEL:claude-3-5-sonnet-20241022}
    usda:
      api-key: ${USDA_API_KEY:DEMO_KEY}
